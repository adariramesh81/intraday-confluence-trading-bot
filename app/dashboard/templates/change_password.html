<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} Password</title>
    <link rel="stylesheet" href="/static/css/style.css">
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel" aria-label="Change password">
        <div class="login-header">
          <span class="login-kicker">First Sign In</span>
          <h1>Change Password</h1>
          <p>Create a permanent password before opening the dashboard.</p>
        </div>
        <form class="login-form" method="post" action="/change-password">
          <label for="password">New Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required autofocus>

          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>

          {% if error %}
          <p class="login-error">{{ error }}</p>
          {% endif %}

          <button type="submit">Save password</button>
        </form>
      </section>
    </main>
  </body>
</html>
